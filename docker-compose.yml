services:
  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-3.5.0}
    container_name: opensearch
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Cedar7!FluxOrbit29}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -skf -u "admin:${OPENSEARCH_ADMIN_PASSWORD:-Cedar7!FluxOrbit29}" https://localhost:9200/_cluster/health?wait_for_status=yellow\&timeout=5s >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - opensearch-net
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:${OPENSEARCH_VERSION:-3.5.0}
    container_name: opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    ports:
      - "5601:5601"
    networks:
      - opensearch-net
    restart: unless-stopped

  opensearchgateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opensearchgateway
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-dashboards:
        condition: service_started
      ldap:
        condition: service_started
    environment:
      OPENSEARCH_URL: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-Cedar7!FluxOrbit29}
      OPENSEARCH_SKIP_TLS_VERIFY: "true"
      DASHBOARDS_URL: http://opensearch-dashboards:5601
      DASHBOARDS_USERNAME: admin
      DASHBOARDS_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD:-Cedar7!FluxOrbit29}
      DASHBOARDS_TENANT: admin_tenant
      LISTEN_ADDR: :8080
    ports:
      - "8080:8080"
    networks:
      - opensearch-net
    restart: unless-stopped

  ldap:
    image: glauth/glauth
    container_name: ldap
    restart: always
    ports:
      - "389:389"
    volumes:
      - ./testldap/default-config.cfg:/app/config/config.cfg
      - ./testldap/key.pem:/app/config/key.pem
      - ./testldap/cert.pem:/app/config/cert.pem
    networks:
      - opensearch-net

volumes:
  opensearch-data:

networks:
  opensearch-net:
